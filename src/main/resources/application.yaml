spring:
  application:
    name: note
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mongodb:
    uri: ${MONGODB_CONNECTION_STRING}
    auto-index-creation: false
  messages:
    basename: messages
    encoding: UTF-8
    use-code-as-default-message: true
  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 100
        one-indexed-parameters: false

jwt:
  secret: ${JWT_SECRET_BASE64}

app:
  rate-limit:
    # Defaults are tuned for production: strict enough to stop brute-force,
    # loose enough to never inconvenience a real user. The `dev` profile
    # overrides these with much higher caps for local testing.
    enabled: true
    login:
      capacity: 20
      refill: PT1M
    register:
      capacity: 20
      refill: PT1H
    refresh:
      capacity: 120
      refill: PT1M
    authenticated:
      capacity: 300
      refill: PT1M

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    mongo:
      enabled: false
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: Notes API with JWT auth, i18n, and token revocation
    version: 0.0.1-SNAPSHOT

server:
  port: 8181
  error:
    include-stacktrace: on_param
    include-message: always

logging:
  level:
    root: INFO
    com.example.studing: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.mongodb.driver: WARN

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - http://localhost:8080

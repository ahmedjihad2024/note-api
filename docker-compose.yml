# Run the app in a container. Reads secrets/config from a local `.env` file
# (copy .env.example -> .env and fill it in). MongoDB is external (Atlas), so no
# database service is defined here.
#
#   docker compose up --build
#   docker build -t note-api
#
services:
  api:
    build: .
    ports:
      # host:container — must match PORT in .env (the app listens on $PORT inside).
      - "8181:8181"
    env_file:
      - .env
#    environment:
#      SPRING_PROFILES_ACTIVE: prod
#      PORT: 8080
    volumes:
      # Persist uploaded avatars across restarts/rebuilds.
      - avatars:/data/avatars
    restart: unless-stopped

volumes:
  avatars:
